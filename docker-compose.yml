version: '3.8'

services:
  origin:
    image: nginx:alpine
    container_name: proxy-origin
    ports:
      - "8081:8081"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-network
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    container_name: proxy-valkey
    ports:
      - "6379:6379"
    networks:
      - proxy-network
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: proxy-service
    ports:
      - "8080:8080"
    environment:
      - ORIGIN_URL=http://origin:8081
      - VALKEY_ADDR=valkey:6379
      - CACHE_TTL=30
      - RATE_LIMIT=10
      - RATE_WINDOW=60
    depends_on:
      - origin
      - valkey
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge

volumes:
  valkey-data: